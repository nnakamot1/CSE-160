<!DOCTYPE html>
<html>
<head>
  <title>Assignment 0 - Vector Operations</title>
  <script src="lib/cuon-matrix-cse160.js"></script>
  <script src="asg0.js"></script>
  <style>
    body { background: #f0f0f0; font-family: Arial, sans-serif; padding: 10px; }
    canvas { display: block; border: 1px solid #333; }
    .controls { margin-top: 10px; }
    label { margin-right: 8px; }
    input[type="number"] { width: 60px; }
  </style>
</head>
<body onload="main()">
  <canvas id="example" width="400" height="400">
    Your browser does not support the HTML5 canvas element.
  </canvas>

  <div class="controls">
    <b>V1:</b>
    <label>x: <input type="number" id="v1x" value="1" step="0.1"/></label>
    <label>y: <input type="number" id="v1y" value="2" step="0.1"/></label>
    &nbsp;&nbsp;
    <b>V2:</b>
    <label>x: <input type="number" id="v2x" value="3" step="0.1"/></label>
    <label>y: <input type="number" id="v2y" value="1" step="0.1"/></label>
    &nbsp;&nbsp;
    <input type="button" value="Draw" onclick="handleDrawEvent()"/>
  </div>

  <div class="controls">
    <b>Operation:</b>
    <select id="operation">
      <option value="add">Add</option>
      <option value="sub">Subtract</option>
      <option value="mul">Multiply</option>
      <option value="div">Divide</option>
      <option value="magnitude">Magnitude</option>
      <option value="normalize">Normalize</option>
      <option value="angle">Angle Between</option>
      <option value="area">Area</option>
    </select>
    &nbsp;
    <label>Scalar: <input type="number" id="scalar" value="2" step="0.1"/></label>
    &nbsp;
    <input type="button" value="Draw Operation" onclick="handleDrawOperationEvent()"/>
  </div>
</body>
</html>
